openapi: "3.0.3"
info:
  title: Test API
  version: "2.0"
  description: A test API for xBOM API-BOM testing
servers:
  - url: https://api.example.com/v2
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /users:
    get:
      summary: List users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
    post:
      summary: Create user
      security:
        - bearerAuth: []
      responses:
        "201":
          description: User created
  /users/{id}:
    get:
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
    delete:
      summary: Delete user
      security:
        - bearerAuth: []
      responses:
        "204":
          description: User deleted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

rules:
  # --- Weak Hash Algorithms ---
  - id: xbom-js-weak-hash-md5
    pattern-either:
      - pattern: crypto.createHash('md5')
      - pattern: crypto.createHash("md5")
      - pattern: CryptoJS.MD5(...)
    message: Use of weak MD5 hash algorithm
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      subcategory: cryptography
      xbom:
        asset_type: algorithm
        name: MD5
        primitive: hash
        parameter_set: "128"
        weakness: weak_algorithm

  - id: xbom-js-weak-hash-sha1
    pattern-either:
      - pattern: crypto.createHash('sha1')
      - pattern: crypto.createHash("sha1")
      - pattern: CryptoJS.SHA1(...)
    message: Use of weak SHA-1 hash algorithm
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      subcategory: cryptography
      xbom:
        asset_type: algorithm
        name: SHA-1
        primitive: hash
        parameter_set: "160"
        weakness: weak_algorithm

  # --- Weak Symmetric Ciphers ---
  - id: xbom-js-weak-cipher-des
    pattern-either:
      - pattern: crypto.createCipheriv('des', ...)
      - pattern: crypto.createCipheriv('des-cbc', ...)
      - pattern: crypto.createCipheriv('des-ecb', ...)
      - pattern: crypto.createCipheriv('des-ede3', ...)
      - pattern: crypto.createCipheriv('des-ede3-cbc', ...)
      - pattern: CryptoJS.DES.encrypt(...)
      - pattern: CryptoJS.TripleDES.encrypt(...)
    message: Use of weak DES/3DES cipher
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      subcategory: cryptography
      xbom:
        asset_type: algorithm
        name: DES
        primitive: block-cipher
        parameter_set: "56"
        weakness: weak_algorithm

  - id: xbom-js-weak-cipher-rc4
    pattern-either:
      - pattern: crypto.createCipheriv('rc4', ...)
      - pattern: CryptoJS.RC4.encrypt(...)
    message: Use of weak RC4 stream cipher
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      subcategory: cryptography
      xbom:
        asset_type: algorithm
        name: RC4
        primitive: stream-cipher
        weakness: weak_algorithm

  # --- Insecure TLS/SSL ---
  - id: xbom-js-tls-no-verify
    pattern-either:
      - pattern: "rejectUnauthorized: false"
      - pattern: process.env.NODE_TLS_REJECT_UNAUTHORIZED = '0'
      - pattern: process.env['NODE_TLS_REJECT_UNAUTHORIZED'] = '0'
    message: TLS certificate verification disabled
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      subcategory: cryptography
      xbom:
        asset_type: protocol
        name: TLS
        weakness: deprecated_protocol

  - id: xbom-js-insecure-tls-protocol
    pattern-either:
      - pattern: "secureProtocol: 'SSLv3_method'"
      - pattern: "secureProtocol: 'TLSv1_method'"
      - pattern: "minVersion: 'TLSv1'"
      - pattern: "maxVersion: 'TLSv1'"
    message: Use of deprecated TLS protocol version
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      subcategory: cryptography
      xbom:
        asset_type: protocol
        name: TLS
        weakness: deprecated_protocol

  # --- Insecure Random ---
  - id: xbom-js-insecure-random
    pattern: Math.random()
    message: >
      Math.random() is not cryptographically secure.
      Use crypto.randomBytes() or crypto.getRandomValues() for security-sensitive values.
    severity: INFO
    languages: [javascript, typescript]
    metadata:
      category: security
      subcategory: cryptography
      xbom:
        asset_type: related-crypto-material
        name: PRNG
        weakness: weak_algorithm

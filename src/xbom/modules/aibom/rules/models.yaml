# Model reference patterns and deprecated model lists

# Model name regex patterns: [regex, model_id, description]
# Applied to string literals in source code
patterns:
  # OpenAI
  - ['["\u0027]gpt-4o(?:-mini)?["\u0027]', openai/gpt-4o, "OpenAI GPT-4o model reference"]
  - ['["\u0027]gpt-4(?:-turbo)?(?:-\d{4}-\d{2}-\d{2})?["\u0027]', openai/gpt-4, "OpenAI GPT-4 model reference"]
  - ['["\u0027]gpt-3\.5-turbo[^"\u0027]*["\u0027]', openai/gpt-3.5-turbo, "OpenAI GPT-3.5 model reference"]
  - ['["\u0027]o[134]-(?:mini|preview|pro)[^"\u0027]*["\u0027]', openai/o-series, "OpenAI o-series reasoning model reference"]
  - ['["\u0027]text-embedding-(?:3-(?:small|large)|ada-002)["\u0027]', openai/embedding, "OpenAI embedding model reference"]
  - ['["\u0027]dall-e-[23]["\u0027]', openai/dall-e, "OpenAI DALL-E model reference"]
  - ['["\u0027]whisper-1["\u0027]', openai/whisper, "OpenAI Whisper model reference"]
  - ['["\u0027]tts-1(?:-hd)?["\u0027]', openai/tts, "OpenAI TTS model reference"]
  # Anthropic
  - ['["\u0027]claude-(?:3|3\.5|4|opus|sonnet|haiku)[^"\u0027]*["\u0027]', anthropic/claude, "Anthropic Claude model reference"]
  # Google
  - ['["\u0027]gemini-(?:2|1\.5|1\.0|pro|flash|ultra|nano)[^"\u0027]*["\u0027]', google/gemini, "Google Gemini model reference"]
  # Meta (case-insensitive)
  - pattern: '["\u0027](?:meta-)?llama-?[234][^"\u0027]*["\u0027]'
    model_id: meta/llama
    description: "Meta Llama model reference"
    flags: IGNORECASE
  # Mistral (case-insensitive)
  - pattern: '["\u0027](?:mistral-(?:large|medium|small|nemo|tiny)|mixtral|codestral|pixtral)[^"\u0027]*["\u0027]'
    model_id: mistral/mistral
    description: "Mistral model reference"
    flags: IGNORECASE
  # Cohere
  - ['["\u0027]command-r(?:-plus)?[^"\u0027]*["\u0027]', cohere/command-r, "Cohere Command-R model reference"]
  # Stability (case-insensitive)
  - pattern: '["\u0027]stable-diffusion[^"\u0027]*["\u0027]'
    model_id: stability/stable-diffusion
    description: "Stable Diffusion model reference"
    flags: IGNORECASE
  # DeepSeek (case-insensitive)
  - pattern: '["\u0027]deepseek-(?:chat|coder|reasoner|r1|v[23])[^"\u0027]*["\u0027]'
    model_id: deepseek/deepseek
    description: "DeepSeek model reference"
    flags: IGNORECASE
  # Qwen (case-insensitive)
  - pattern: '["\u0027]qwen[^"\u0027]*["\u0027]'
    model_id: alibaba/qwen
    description: "Alibaba Qwen model reference"
    flags: IGNORECASE

# Models known to be deprecated / sunset
deprecated:
  # OpenAI
  - gpt-3.5-turbo-0301
  - gpt-3.5-turbo-0613
  - text-davinci-003
  - text-davinci-002
  - code-davinci-002
  - text-ada-001
  - text-babbage-001
  - text-curie-001
  - text-embedding-ada-002
  - gpt-4-0314
  - gpt-4-0613
  - gpt-4-32k-0314
  - gpt-4-32k-0613
  # Anthropic
  - claude-instant-1
  - claude-instant-1.2
  - claude-2.0
  - claude-2.1
  - claude-3-haiku-20240307
  # Google
  - palm-2

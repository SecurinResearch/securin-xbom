# Jupyter notebook import pattern (single compound regex)
jupyter_pattern: '(?:import|from)\s+(?:openai|anthropic|langchain|llama_index|crewai|autogen|transformers|torch|tensorflow|keras|sklearn|chromadb|pinecone|qdrant|weaviate|cohere|mistralai|google\.generativeai|vertexai|ollama|sentence_transformers|litellm|dspy|haystack|semantic_kernel)'
